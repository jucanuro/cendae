{% load static %}
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<header id="main-header"

    <div id="header-shell"
         class="relative w-full border-b border-white/10 bg-[#020817]/80 backdrop-blur-2xl transition-all duration-500">

        <div class="pointer-events-none absolute inset-0 overflow-hidden">
            <div class="absolute left-0 top-0 h-px w-full bg-gradient-to-r from-transparent via-[#e5142d]/70 to-transparent"></div>
            <div class="absolute -left-40 top-0 h-24 w-96 bg-[#e5142d]/10 blur-3xl"></div>
            <div class="absolute right-0 top-0 h-24 w-[520px] bg-blue-500/10 blur-3xl"></div>
            <div class="absolute bottom-0 left-0 h-px w-full bg-gradient-to-r from-[#e5142d]/50 via-white/10 to-blue-500/40"></div>
        </div>

        <div class="relative flex h-[86px] w-full items-center justify-between px-5 transition-all duration-500 sm:px-8 lg:px-12 xl:px-16">

            <a href="/" class="group flex items-center gap-4">
                <div class="relative flex h-12 w-12 items-center justify-center overflow-hidden border border-white/15 bg-white/10">
                    <div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 h-[3px] w-full bg-[#e5142d]"></div>
                    <span class="relative text-lg font-black text-white">C</span>
                </div>

                <div class="flex flex-col">
                    <span class="text-2xl font-black leading-none tracking-[-0.05em] text-white lg:text-3xl">
                        CEN<span class="text-[#e5142d]">DAE</span>
                    </span>
                    <span class="mt-1 text-[10px] font-bold uppercase tracking-[0.35em] text-white/40">
                        Ciencia de Datos
                    </span>
                </div>
            </a>

            <nav class="hidden items-center gap-2 lg:flex">
                <a href="#inicio" class="nav-link">Inicio</a>
                <a href="#cursos" class="nav-link">Cursos</a>
            </nav>

            <div class="hidden items-center gap-5 lg:flex">
                <div class="flex items-center gap-3 border-l border-white/10 pl-6">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-60"></span>
                        <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-emerald-400"></span>
                    </span>
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black uppercase tracking-[0.28em] text-white/35">Estado</span>
                        <span class="text-xs font-bold text-white/80">Admisión 2026</span>
                    </div>
                </div>

                <a href="https://intranet.cendae.pe/login/index.php"
                   target="_blank"
                   rel="noopener"
                   class="group relative inline-flex items-center gap-4 overflow-hidden bg-white px-6 py-3.5 text-sm font-black text-[#001A3D] transition-all duration-500 hover:bg-[#e5142d] hover:text-white">

                    <span class="absolute inset-0 translate-x-[-120%] bg-gradient-to-r from-transparent via-white/40 to-transparent transition-transform duration-700 group-hover:translate-x-[120%]"></span>

                    <span class="relative">Aula Virtual</span>

                    <span class="relative flex h-8 w-8 items-center justify-center bg-[#001A3D] text-white transition group-hover:bg-white group-hover:text-[#e5142d]">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                  d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                        </svg>
                    </span>
                </a>
            </div>

            <button type="button"
                    onclick="toggleMobileMenu()"
                    class="relative flex h-12 w-12 items-center justify-center border border-white/15 bg-white/10 text-white lg:hidden">
                <svg id="mobile-menu-icon" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                          d="M4 7h16M4 12h16M4 17h16"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<div id="mobile-menu"
     class="fixed inset-0 z-[190] translate-y-[-100%] bg-[#020817]/98 px-6 pt-28 backdrop-blur-2xl transition-transform duration-700 ease-[cubic-bezier(0.19,1,0.22,1)] lg:hidden">

    <div class="pointer-events-none absolute inset-0 overflow-hidden">
        <div class="absolute -right-32 top-10 h-80 w-80 bg-[#e5142d]/15 blur-3xl"></div>
        <div class="absolute -left-32 bottom-20 h-80 w-80 bg-blue-500/10 blur-3xl"></div>
    </div>

    <div class="relative mx-auto max-w-md">
        <span class="text-[10px] font-black uppercase tracking-[0.45em] text-[#e5142d]">
            Navegación
        </span>

        <nav class="mt-8 flex flex-col border-y border-white/10">
            <a href="#inicio" onclick="toggleMobileMenu()" class="mobile-link">
                <span>Inicio</span>
                <small>01</small>
            </a>

            <a href="#cursos" onclick="toggleMobileMenu()" class="mobile-link">
                <span>Cursos</span>
                <small>02</small>
            </a>
        </nav>

        <a href="https://intranet.cendae.pe/login/index.php"
           target="_blank"
           rel="noopener"
           class="group mt-10 flex items-center justify-between bg-white p-5 text-[#001A3D]">
            <div>
                <span class="text-[10px] font-black uppercase tracking-[0.32em] text-[#e5142d]">
                    Estudiantes
                </span>
                <p class="mt-1 text-xl font-black tracking-tight">Ingresar al Aula Virtual</p>
            </div>

            <span class="flex h-12 w-12 items-center justify-center bg-[#001A3D] text-white transition group-hover:bg-[#e5142d]">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M14 5l7 7m0 0l-7 7m7-7H3"
                          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </a>
    </div>
</div>

<style>
    .nav-link {
        position: relative;
        overflow: hidden;
        padding: 14px 22px;
        font-size: 13px;
        font-weight: 800;
        color: rgba(255, 255, 255, .62);
        letter-spacing: .02em;
        transition: all .35s ease;
    }

    .nav-link::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, .08);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform .35s ease;
    }

    .nav-link::after {
        content: "";
        position: absolute;
        left: 22px;
        right: 22px;
        bottom: 8px;
        height: 2px;
        background: #e5142d;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform .35s ease;
    }

    .nav-link:hover {
        color: white;
    }

    .nav-link:hover::before,
    .nav-link:hover::after {
        transform: scaleX(1);
    }

    .mobile-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 0;
        color: white;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -0.05em;
        border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .mobile-link small {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: .35em;
        color: rgba(255,255,255,.28);
    }

    #mobile-menu.active {
        transform: translateY(0);
    }

    #main-header.header-scrolled #header-shell {
        background: rgba(2, 8, 23, .94);
        box-shadow: 0 24px 60px -35px rgba(0,0,0,.8);
    }

    #main-header.header-scrolled .relative.flex.h-\[86px\] {
        height: 74px;
    }
</style>

<script>
    const mainHeader = document.getElementById('main-header');

    window.addEventListener('scroll', function () {
        if (window.scrollY > 24) {
            mainHeader.classList.add('header-scrolled');
        } else {
            mainHeader.classList.remove('header-scrolled');
        }
    });

    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('mobile-menu-icon');

        menu.classList.toggle('active');

        if (menu.classList.contains('active')) {
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                      d="M6 18L18 6M6 6l12 12"/>
            `;
        } else {
            icon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                      d="M4 7h16M4 12h16M4 17h16"/>
            `;
        }
    }
</script>
