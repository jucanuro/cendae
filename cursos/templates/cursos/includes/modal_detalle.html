<style>
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {

    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #e5142d;
    }

    #modal-temario .accordion-item {
        overflow: hidden;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        transition: all .35s ease;
        box-shadow: 0 18px 50px -45px rgba(15, 23, 42, .75);
    }

    #modal-temario .accordion-item:hover {
        border-color: rgba(229, 20, 45, .35);
        transform: translateY(-2px);
    }

    #modal-temario .accordion-trigger {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
        padding: 1.25rem 1.5rem;
        cursor: pointer;
        background: #ffffff;
    }

    #modal-temario .accordion-number {
        font-size: .65rem;
        font-weight: 900;
        color: #e5142d;
        letter-spacing: .16em;
    }

    #modal-temario .accordion-title {
        font-size: .78rem;
        font-weight: 900;
        color: #001A3D;
        text-transform: uppercase;
        letter-spacing: .02em;
        line-height: 1.25;
    }

    #modal-temario .accordion-content {
        max-height: 0;
        overflow: hidden;
        background: #f8fafc;
        transition: max-height .5s ease;
    }

    #modal-temario .accordion-body {
        padding: .5rem 1.5rem 1.5rem 3.8rem;
        display: grid;
        gap: .75rem;
    }

    #modal-temario .lesson-item {
        display: flex;
        align-items: center;
        gap: .75rem;
        color: #64748b;
        font-size: .72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .01em;
        line-height: 1.3;
    }

    #modal-temario .lesson-dot {
        width: .35rem;
        height: .35rem;
        background: rgba(229, 20, 45, .65);
        flex-shrink: 0;
    }
</style>

<script>
    function syncCursoModalMobileFields() {
        const precio = document.getElementById('modal-precio');
        const nivel = document.getElementById('modal-nivel');
        const precioMobile = document.getElementById('modal-precio-mobile');
        const nivelMobile = document.getElementById('modal-nivel-mobile');
        const whatsapp = document.getElementById('modal-whatsapp');
        const whatsappMobile = document.getElementById('modal-whatsapp-mobile');

        if (precio && precioMobile) precioMobile.innerText = precio.innerText;
        if (nivel && nivelMobile) nivelMobile.innerText = nivel.innerText;
        if (whatsapp && whatsappMobile) whatsappMobile.href = whatsapp.href;
    }

    function closeModal() {
        const modal = document.getElementById('cursoModal');
        if (!modal) return;

        modal.classList.add('hidden');
        modal.classList.remove('flex');

        const catalogModal = document.getElementById('catalogModal');
        if (!catalogModal || catalogModal.classList.contains('hidden')) {
            document.body.style.overflow = 'auto';
        }
    }

    function toggleAccordion(element) {
        const content = element.nextElementSibling;
        const icon = element.querySelector('.icon-chevron');

        document.querySelectorAll('#modal-temario .accordion-content').forEach(other => {
            if (other !== content && other.style.maxHeight) {
                other.style.maxHeight = null;
                const otherIcon = other.parentElement.querySelector('.icon-chevron');
                if (otherIcon) otherIcon.style.transform = 'rotate(0deg)';
            }
        });

        if (content.style.maxHeight) {
            content.style.maxHeight = null;
            if (icon) icon.style.transform = 'rotate(0deg)';
        } else {
            content.style.maxHeight = content.scrollHeight + "px";
            if (icon) icon.style.transform = 'rotate(180deg)';
        }
    }
</script>
